services:
  mysql:
    image: mysql:8.4
    container_name: foundations-bot-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: foundations_bot
      MYSQL_USER: foundations
      MYSQL_PASSWORD: foundations
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: foundations-bot
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      PORT: 8080

volumes:
  mysql-data:
